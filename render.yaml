services:
  - type: web
    name: paymenty-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false
      - key: MONGO_MAX_POOL_SIZE
        value: 10
      - key: MONGO_MIN_POOL_SIZE
        value: 1
      - key: MONGO_SERVER_SELECTION_TIMEOUT_MS
        value: 10000
      - key: MONGO_SOCKET_TIMEOUT_MS
        value: 45000
      - key: ANALYTICS_WARM_ON_START
        value: true
      - key: ANALYTICS_WARM_INTERVAL_MS
        value: 300000
      - key: JWT_SECRET
        sync: false
      - key: OWNER_MODULE_PASSWORD
        sync: false

  - type: static_site
    name: paymenty-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://paymenty-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
